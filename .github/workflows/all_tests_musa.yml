name: s5000_tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # Allows manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  run_tests:
    # Package manager and environment settings are read from .github/configs/musa.yml
    uses: ./.github/workflows/all_tests_common.yml
    with:
      platform: musa
      run_unit_tests: true
      run_functional_tests: false

  all_tests:
    needs: run_tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify workflow status
        run: |
          if [ "${{ needs.run_tests.result }}" != "success" ]; then
            echo "❌ Tests workflow failed"
            exit 1
          fi
          echo "✅ All tests passed!"
