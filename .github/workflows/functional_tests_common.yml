# Disabled for compatibility issues
name: Common Functional Tests - Training

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: Platform name (e.g., cuda, default)
      test_matrix:
        required: true
        type: string
        description: JSON array of test configurations
      image:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      container_volumes:
        required: true
        type: string
      container_options:
        required: true
        type: string

jobs:
  functional_test_train:
    defaults:
      run:
        shell: bash
    env:
      PROJECT_ROOT: ${{ github.workspace }}
    runs-on: ${{ fromJson(inputs.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        test_config: ${{ fromJson(inputs.test_matrix) }}
    container:
      image: ${{ inputs.image }}
      ports:
        - 80
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # - name: Set safe directory
      #   run: |
      #     git config --global --add safe.directory $PROJECT_ROOT
      ## The above step is commented out because there is no git cli in the container, and it causes the step to fail. The safe directory is set in the next step with a conditional check.
      - name: Set safe directory
        run: |
          command -v git && git config --global --add safe.directory $PROJECT_ROOT || true

      - name: Activate Python environment
        run: |
          if [ -f /opt/conda/etc/profile.d/conda.sh ]; then
            source /opt/conda/etc/profile.d/conda.sh
            conda activate base
          fi
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "Python: $(which python) ($(python --version 2>&1))"

      - name: Setup Python environment
        run: |
          set -euo pipefail
          cd $PROJECT_ROOT
          pip install -e . --no-deps 
        timeout-minutes: 30

      - name: Install dependencies (yq, envsubst, uv shim)
        run: |
          # Install mikefarah/yq (v4)
          if ! command -v yq &>/dev/null; then
            ARCH=$(uname -m)
            case "$ARCH" in x86_64) YQ_ARCH=amd64 ;; aarch64) YQ_ARCH=arm64 ;; *) YQ_ARCH=amd64 ;; esac
            wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_${YQ_ARCH}"
            chmod +x /usr/local/bin/yq
          fi
          yq --version

          # Install envsubst (from gettext)
          if ! command -v envsubst &>/dev/null; then
            apt-get install -y -qq gettext-base 2>/dev/null || \
            conda install -y -q gettext 2>/dev/null || true
          fi
          envsubst --version

          # Create uv shim: run_ci_test.sh calls 'uv run --no-sync python/pytest ...'
          # Translate to direct python/pytest invocation using the conda environment
          if ! command -v uv &>/dev/null; then
            cat > /usr/local/bin/uv << 'EOF'
          #!/bin/bash
          # Shim: translate 'uv run [--no-sync] CMD ...' to 'CMD ...'
          if [[ "$1" == "run" ]]; then
            shift
          [[ "$1" == "--no-sync" ]] && shift
            exec "$@"
          fi
          echo "uv shim: unsupported command: $*" >&2
          exit 1
          EOF
            chmod +x /usr/local/bin/uv
          fi
          uv --version || echo "uv shim installed"

      - name: Run functional tests
        id: functional_test
        run: |
          set -euo pipefail
          cd $PROJECT_ROOT

          MODEL='${{ matrix.test_config.model }}'
          TEST_CASE='${{ matrix.test_config.test_case }}'
          TRAINING_SCRIPT='${{ matrix.test_config.training_script }}'
          N_REPEAT='${{ matrix.test_config.n_repeat || 1 }}'

          echo "Running functional test: ${MODEL}/${TEST_CASE}"
          echo "Training script: ${TRAINING_SCRIPT}"

          export PYTHONPATH=$PROJECT_ROOT:${PYTHONPATH:-}

          OUTPUT_DIR="./test_output/${TEST_CASE}"
          mkdir -p "${OUTPUT_DIR}"

          ARGUMENTS=(
            "DATA_PATH=/opt/data/datasets"
            "DATA_CACHE_PATH=/tmp/data_cache"
            "OUTPUT_PATH=${OUTPUT_DIR}"
            "TENSORBOARD_PATH=${OUTPUT_DIR}/tensorboard"
            "CHECKPOINT_SAVE_PATH=${OUTPUT_DIR}/checkpoints"
            "CHECKPOINT_LOAD_PATH=/tmp/checkpoints"
            "TRAINING_SCRIPT_PATH=${TRAINING_SCRIPT}"
            "TRAINING_PARAMS_PATH=./tests/functional_tests/test_cases/${MODEL}/${TEST_CASE}/model_config.yaml"
            "GOLDEN_VALUES_PATH=./tests/functional_tests/test_cases/${MODEL}/${TEST_CASE}/golden_values_dev_${{ inputs.platform }}.json"
            "N_REPEAT=${N_REPEAT}"
            "ENABLE_LIGHTWEIGHT_MODE=1"
          )

          bash ./tests/functional_tests/shell_test_utils/run_ci_test.sh "${ARGUMENTS[@]}"
          exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "✅ Functional test passed: ${MODEL}/${TEST_CASE}"
          else
            echo "❌ Functional test failed: ${MODEL}/${TEST_CASE} (exit code: $exit_code)"
          fi

          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code
        timeout-minutes: 60
