# Disabled for compatibility issues
name: Common Functional Tests - Training

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: Platform name (e.g., cuda, default)
      test_matrix:
        required: true
        type: string
        description: JSON array of test configurations
      image:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      container_volumes:
        required: true
        type: string
      container_options:
        required: true
        type: string

jobs:
  functional_test_train:
    defaults:
      run:
        shell: bash
    env:
      PROJECT_ROOT: ${{ github.workspace }}
    runs-on: ${{ fromJson(inputs.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        test_config: ${{ fromJson(inputs.test_matrix) }}
    container:
      image: ${{ inputs.image }}
      ports:
        - 80
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # - name: Set safe directory
      #   run: |
      #     git config --global --add safe.directory $PROJECT_ROOT
      ## The above step is commented out because there is no git cli in the container, and it causes the step to fail. The safe directory is set in the next step with a conditional check.
      - name: Set safe directory
        run: |
          command -v git && git config --global --add safe.directory $PROJECT_ROOT || true

      - name: Activate Python environment
        run: |
          source /opt/conda/etc/profile.d/conda.sh
          conda activate base   # 或镜像内实际的 env name
          echo "PATH=$PATH" >> $GITHUB_ENV
    
      - name: Setup Python environment
        run: |
          set -euo pipefail
          cd $PROJECT_ROOT
          pip install -e . --no-deps 
        timeout-minutes: 30

      - name: Run functional tests
        id: functional_test
        run: |
          set -euo pipefail
          cd $PROJECT_ROOT

          MODEL='${{ matrix.test_config.model }}'
          TEST_CASE='${{ matrix.test_config.test_case }}'
          TRAINING_SCRIPT='${{ matrix.test_config.training_script }}'
          N_REPEAT='${{ matrix.test_config.n_repeat || 1 }}'

          echo "Running functional test: ${MODEL}/${TEST_CASE}"
          echo "Training script: ${TRAINING_SCRIPT}"

          export PYTHONPATH=$PROJECT_ROOT:${PYTHONPATH:-}

          OUTPUT_DIR="./test_output/${TEST_CASE}"
          mkdir -p "${OUTPUT_DIR}"

          ARGUMENTS=(
            "DATA_PATH=/opt/data/datasets"
            "DATA_CACHE_PATH=/tmp/data_cache"
            "OUTPUT_PATH=${OUTPUT_DIR}"
            "TENSORBOARD_PATH=${OUTPUT_DIR}/tensorboard"
            "CHECKPOINT_SAVE_PATH=${OUTPUT_DIR}/checkpoints"
            "CHECKPOINT_LOAD_PATH=/tmp/checkpoints"
            "TRAINING_SCRIPT_PATH=${TRAINING_SCRIPT}"
            "TRAINING_PARAMS_PATH=./tests/functional_tests/test_cases/${MODEL}/${TEST_CASE}/model_config.yaml"
            "GOLDEN_VALUES_PATH=./tests/functional_tests/test_cases/${MODEL}/${TEST_CASE}/golden_values_dev_${{ inputs.platform }}.json"
            "N_REPEAT=${N_REPEAT}"
            "ENABLE_LIGHTWEIGHT_MODE=1"
          )

          bash ./tests/functional_tests/shell_test_utils/run_ci_test.sh "${ARGUMENTS[@]}"
          exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "✅ Functional test passed: ${MODEL}/${TEST_CASE}"
          else
            echo "❌ Functional test failed: ${MODEL}/${TEST_CASE} (exit code: $exit_code)"
          fi

          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code
        timeout-minutes: 60

      - name: Debug - keep container alive on failure
        if: failure()
        run: |
          echo "Container sleeping for 10 minutes for debugging..."
          echo "On host, run: docker ps  then  docker exec -it <container_id> bash"
          sleep 600
        timeout-minutes: 60
