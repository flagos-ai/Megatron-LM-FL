name: Common All Tests

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: Platform configuration name
      run_unit_tests:
        required: false
        type: boolean
        default: true
        description: Whether to run unit tests in this workflow
      run_functional_tests:
        required: false
        type: boolean
        default: true
        description: Whether to run functional tests in this workflow

jobs:
  checkout_and_config:
    name: checkout_and_config
    defaults:
      run:
        shell: bash
    runs-on: ubuntu-latest
    outputs:
      ci_image: ${{ steps.config.outputs.ci_image }}
      runs_on: ${{ steps.config.outputs.runs_on }}
      container_volumes: ${{ steps.config.outputs.container_volumes }}
      container_options: ${{ steps.config.outputs.container_options }}
      device_types: ${{ steps.config.outputs.device_types }}
      setup_script: ${{ steps.config.outputs.setup_script }}
      nproc_per_node: ${{ steps.config.outputs.nproc_per_node }}
      train_test_matrix: ${{ steps.config.outputs.train_test_matrix }}
      unit_test_groups: ${{ steps.config.outputs.unit_test_groups }}
      unit_pytest_extra_args: ${{ steps.config.outputs.unit_pytest_extra_args }}
      ignored_tests: ${{ steps.config.outputs.ignored_tests }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Load platform configuration
        id: config
        run: |
          set -euo pipefail

          PLATFORM="${{ inputs.platform }}"
          CONFIG_FILE=".github/configs/${PLATFORM}.yml"

          # Install mikefarah/yq (v4) for YAML parsing
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          /usr/local/bin/yq --version
          echo "Loading configuration from $CONFIG_FILE"

          # Read CI image
          CI_IMAGE=$(yq '.ci_image' "$CONFIG_FILE")
          echo "ci_image=$CI_IMAGE" >> $GITHUB_OUTPUT

          # Read runner labels and format as JSON array
          RUNS_ON=$(yq '.runner_labels | tojson(0)' "$CONFIG_FILE")
          echo "runs_on=$RUNS_ON" >> $GITHUB_OUTPUT

          # Read container volumes and format as JSON array
          VOLUMES=$(yq '.container_volumes | tojson(0)' "$CONFIG_FILE")
          echo "container_volumes=$VOLUMES" >> $GITHUB_OUTPUT

          # Read container options
          OPTIONS=$(yq '.container_options' "$CONFIG_FILE")
          echo "container_options=$OPTIONS" >> $GITHUB_OUTPUT

          # Read device types
          DEVICE_TYPES=$(yq '.device_types | tojson(0)' "$CONFIG_FILE")
          echo "device_types=$DEVICE_TYPES" >> $GITHUB_OUTPUT

          # Read the platform setup entry point shared by all test suites.
          SETUP_SCRIPT=$(yq '.setup_script' "$CONFIG_FILE")
          NPROC_PER_NODE=$(yq '.nproc_per_node' "$CONFIG_FILE")
          if [ -z "$SETUP_SCRIPT" ] || [ "$SETUP_SCRIPT" = "null" ]; then
            echo "::error::setup_script is required"
            exit 1
          fi
          if ! [[ "$NPROC_PER_NODE" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::nproc_per_node must be a positive integer"
            exit 1
          fi
          echo "setup_script=$SETUP_SCRIPT" >> $GITHUB_OUTPUT
          echo "nproc_per_node=$NPROC_PER_NODE" >> $GITHUB_OUTPUT

          # Read test matrix for training
          TRAIN_MATRIX=$(yq '.test_matrix.functional.train | tojson(0)' "$CONFIG_FILE")
          echo "train_test_matrix=$TRAIN_MATRIX" >> $GITHUB_OUTPUT

          # Read the complete unit-test contract from the platform configuration.
          UNIT_TEST_GROUPS=$(yq '.test_matrix.unit.groups | tojson(0)' "$CONFIG_FILE")
          UNIT_PYTEST_EXTRA_ARGS=$(yq '.test_matrix.unit.pytest_extra_args // [] | tojson(0)' "$CONFIG_FILE")
          IGNORED_TESTS=$(yq '.test_matrix.unit.ignored_tests // [] | tojson(0)' "$CONFIG_FILE")

          if [ "$UNIT_TEST_GROUPS" = "null" ] || [ "$UNIT_TEST_GROUPS" = "[]" ]; then
            echo "::error::test_matrix.unit.groups must contain at least one test group"
            exit 1
          fi
          echo "unit_test_groups=$UNIT_TEST_GROUPS" >> $GITHUB_OUTPUT
          echo "unit_pytest_extra_args=$UNIT_PYTEST_EXTRA_ARGS" >> $GITHUB_OUTPUT
          echo "ignored_tests=$IGNORED_TESTS" >> $GITHUB_OUTPUT
      
  lint:
    name: lint
    needs: 
      - checkout_and_config
    uses: ./.github/workflows/lint_common.yml
          
  unit_tests:
    name: unit_tests
    if: inputs.run_unit_tests
    needs: 
      - checkout_and_config
      - lint
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.checkout_and_config.outputs.device_types) }}
    uses: ./.github/workflows/unit_tests_common.yml
    with:
      platform: ${{ inputs.platform }}
      device: ${{ matrix.device }}
      image: ${{ needs.checkout_and_config.outputs.ci_image }}
      runs_on: ${{ needs.checkout_and_config.outputs.runs_on }}
      container_volumes: ${{ needs.checkout_and_config.outputs.container_volumes }}
      container_options: ${{ needs.checkout_and_config.outputs.container_options }}
      setup_script: ${{ needs.checkout_and_config.outputs.setup_script }}
      test_groups: ${{ needs.checkout_and_config.outputs.unit_test_groups }}
      nproc_per_node: ${{ needs.checkout_and_config.outputs.nproc_per_node }}
      pytest_extra_args: ${{ needs.checkout_and_config.outputs.unit_pytest_extra_args }}
      ignored_tests: ${{ needs.checkout_and_config.outputs.ignored_tests }}

  unit_tests_complete:
    name: unit_tests_complete
    if: always() && inputs.run_unit_tests
    needs: 
      - unit_tests
    runs-on: ubuntu-latest
    steps:
      - name: Check unit tests result
        run: |
          if [ "${{ needs.unit_tests.result }}" != "success" ] && \
             [ "${{ needs.unit_tests.result }}" != "skipped" ]; then
            echo "❌ Unit tests failed: ${{ needs.unit_tests.result }}"
            exit 1
          fi
          echo "✅ Unit tests passed"

  functional_tests:
    name: functional_tests
    if: inputs.run_functional_tests
    needs:
      - checkout_and_config
      - lint
      - unit_tests_complete
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.checkout_and_config.outputs.device_types) }}
    uses: ./.github/workflows/functional_tests_common.yml
    with:
      platform: ${{ inputs.platform }}
      device: ${{ matrix.device }}
      image: ${{ needs.checkout_and_config.outputs.ci_image }}
      runs_on: ${{ needs.checkout_and_config.outputs.runs_on }}
      container_volumes: ${{ needs.checkout_and_config.outputs.container_volumes }}
      container_options: ${{ needs.checkout_and_config.outputs.container_options }}
      setup_script: ${{ needs.checkout_and_config.outputs.setup_script }}
      nproc_per_node: ${{ needs.checkout_and_config.outputs.nproc_per_node }}
      test_matrix: ${{ needs.checkout_and_config.outputs.train_test_matrix }}

  functional_tests_complete:
    name: functional_tests_complete
    if: always() && inputs.run_functional_tests
    needs: 
      - functional_tests
    runs-on: ubuntu-latest
    steps:
      - name: Check functional tests result
        run: |
          if [ "${{ needs.functional_tests.result }}" != "success" ] && \
             [ "${{ needs.functional_tests.result }}" != "skipped" ]; then
            echo "❌ Functional tests failed: ${{ needs.functional_tests.result }}"
            exit 1
          fi
          echo "✅ Functional tests passed"

  all_tests_complete:
    defaults:
      run:
        shell: bash
    needs:
      - checkout_and_config
      - lint
      - unit_tests_complete
      - functional_tests_complete
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all tests passed
        run: |
          # Check all test jobs
          failed=false

          if [ "${{ needs.lint.result }}" != "success" ] && \
            [ "${{ needs.lint.result }}" != "skipped" ]; then
            echo "❌ Lint failed"
            failed=true
          fi

          if [ "${{ needs.unit_tests_complete.result }}" != "success" ] && \
            [ "${{ needs.unit_tests_complete.result }}" != "skipped" ]; then
            echo "❌ Unit tests failed or cancelled: ${{ needs.unit_tests_complete.result }}"
            failed=true
          fi

          if [ "${{ needs.functional_tests_complete.result }}" != "success" ] && \
            [ "${{ needs.functional_tests_complete.result }}" != "skipped" ]; then
            echo "❌ Functional tests failed or cancelled: ${{ needs.functional_tests_complete.result }}"
            failed=true
          fi

          if [ "$failed" = "true" ]; then
            exit 1
          fi

          echo "✅ All tests completed successfully!"
