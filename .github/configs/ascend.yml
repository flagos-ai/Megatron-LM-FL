      - tests/unit_tests/models/test_llava_model.py::TestLLaVAModel::test_forward_fsdp
      - tests/unit_tests/models/test_llava_model.py::TestLLaVAModelTokenParallel::test_process_embedding_token_parallel

      ## 13b. pipeline_parallel - device-side runtime error 507001 + abort
      # These multi-device cases enter the NPU but fail with Ascend runtime
      # error 507001 ("internal error in the task scheduler module"), surfaced
      # via aclnnInplaceNormal / rtMemcpyAsync / rtEventQueryStatus. One rank
      # aborts (SIGABRT), which tears down the whole process group and cascades
      # into follow-on errors, so the pytest session never reports a summary.
      # This is a device/CANN-level failure on the current 910C image, not a
      # test-logic issue.
      - tests/unit_tests/pipeline_parallel/test_fine_grained_activation_offloading.py::test_fine_grained_activation_offload_with_ep_a2a_overlap_compatibility
      - tests/unit_tests/pipeline_parallel/test_fine_grained_activation_offloading.py::test_gpt_fine_grained_activation_offloading_correctness_and_memory
      - tests/unit_tests/pipeline_parallel/test_multimodule_communicator.py::TestMultiModulePipelineCommunicator::test_send_forward_recv_forward_with_transformer_blocks_and_different_parallelisms
      # The 8-device multimodule schedules use the same TP=2/PP=2 TE path.
      # TE-FL's reference generic_gemm rejects its 1024-by-1536 operands,
      # causing rank divergence and a 30-minute HCCL 507001/SIGABRT cascade.
      - tests/unit_tests/pipeline_parallel/test_multimodule_schedules.py::TestMultimoduleSchedules::test_single_encoder_8gpu
      - tests/unit_tests/pipeline_parallel/test_multimodule_schedules.py::TestMultimoduleSchedules::test_dual_encoder_8gpu

      ## 14. fusions - CUDA/Triton-only kernels
      # Fused MLA YaRN RoPE is implemented with Triton CUDA kernels. The test
      # asserts that those kernels imported successfully, so it cannot fall
      # back to the portable PyTorch implementation on Ascend.
      - tests/unit_tests/fusions/test_mla_yarn_rope_apply.py
      # TE-FL exposes rmsnorm_fwd/rmsnorm_bwd but not the fused residual
      # backward operator rmsnorm_bwd_add used by this test's six variants.
      - tests/unit_tests/fusions/test_rmsnorm_residual_fusion.py

      ## 15. others - unavailable NVIDIA components or test assets
      # FP8 TensorRT-LLM export requires CUDA FP8 execution.
      - tests/unit_tests/export/trtllm/test_distributed_fp8.py
      - tests/unit_tests/export/trtllm/test_single_device_fp8.py
