      ## 13. models - need CUDA / HCCL init errors / TE missing backend
      # MambaSSM not installed (CUDA dependency)
      - tests/unit_tests/models/test_mamba_model.py
      - tests/unit_tests/models/test_mamba_moe_model.py
      - tests/unit_tests/models/test_heterogeneous_gpt_model.py
      # These Mimo multi-device cases enter HCCL but do not complete on the
      # current Ascend 910C/CANN image. They wait for roughly 29 minutes and
      # then fail with runtime error 507001 in the HCCL watchdog, followed by
