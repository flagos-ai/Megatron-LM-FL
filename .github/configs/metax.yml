# Metax Hardware Configuration for Megatron-LM-FL
# This file defines CI/CD settings for Metax-based testing
# Test configurations are defined in tests/test_utils/config/platforms/metax.yaml

hardware_name: metax
display_name: 'Metax Tests'

# Docker image for this hardware
ci_image: localhost:5000/cr.metax-tech.com/public-ai-release/maca/megatron-lm:0.12.0-maca.ai3.3.0.11-torch2.6-py312-ubuntu22.04-amd64

# Runner labels for this hardware
runner_labels:
  - self-hosted
  - Linux
  - X64
  - metax
  - dev

# Container volumes (hardware-specific paths)
container_volumes:
  - /home/flagscale_cicd/flask/static:/workspace/report
  - /home/flagscale_cicd/flask/config:/workspace/config
  - /home/flagscale_cicd/docker/docker_build/docker_data:/home/gitlab-runner/data
  - /home/flagscale_cicd/docker/docker_build/docker_tokenizers:/home/gitlab-runner/tokenizers
  - /home/flagscale_cicd/docker/docker_build/docker_data/Megatron-LM/datasets:/opt/data/datasets
  - /home/flagscale_cicd/docker/docker_build/docker_tokenizers/Megatron-LM/tokenizers:/opt/data/tokenizers
  # Metax GPU driver
  - /dev/dri:/dev/dri
  - /dev/mxcd:/dev/mxcd

# Container options (hardware-specific settings)
container_options: >-
  --privileged
  --shm-size=500g
  --hostname megatron_cicd
  --user root
  --ulimit nofile=65535:65535
  --device=/dev/dri
  --device=/dev/mxcd
  --group-add video
  -e PLATFORM=metax
  -e TORCH_DISTRIBUTED_BACKEND=mccl
  -e MACA_VISIBLE_DEVICES=all
device_types:
  - c500

# Test matrix configuration
test_matrix:
  unit:
    devices:
      - c500
    # Ignored test files for unit tests
    # These files will be skipped when running pytest
    ignored_tests:
      ## core
      - tests/unit_tests/test_inference.py
      - tests/unit_tests/test_rl_utils.py
      - tests/unit_tests/test_hyper_comm_grid.py
      - tests/unit_tests/test_fp8_param.py
      - tests/unit_tests/test_checkpointing.py
      - tests/unit_tests/test_fp8_utils.py ## ZeroDivisionError: integer modulo by zero

      # models
      - tests/unit_tests/models/test_bert_model.py
      - tests/unit_tests/models/test_mamba_model.py

      # transformer
      - tests/unit_tests/transformer/moe/test_a2a_token_dispatcher.py
      - tests/unit_tests/transformer/moe/test_aux_loss.py
      - tests/unit_tests/transformer/moe/test_moe_layer_discrepancy.py
      - tests/unit_tests/transformer/moe/test_routers.py
      - tests/unit_tests/transformer/moe/test_grouped_mlp.py
      - tests/unit_tests/transformer/test_attention.py
      - tests/unit_tests/transformer/test_attention_packed_seq.py
      - tests/unit_tests/transformer/test_cuda_graphs.py
      - tests/unit_tests/transformer/test_full_cuda_graph.py
      - tests/unit_tests/transformer/test_multi_latent_attention.py
      - tests/unit_tests/transformer/test_multi_token_prediction.py
      - tests/unit_tests/transformer/test_retro_attention.py
      - tests/unit_tests/transformer/test_transformer_block.py
      - tests/unit_tests/transformer/test_transformer_block_custom_pgs.py

      # data
      - tests/unit_tests/data/test_preprocess_data.py

      # dist_checkpointing
      - tests/unit_tests/dist_checkpointing/test_local.py
      - tests/unit_tests/dist_checkpointing/test_global_metadata_reuse.py
      - tests/unit_tests/dist_checkpointing/test_optimizer.py
      - tests/unit_tests/dist_checkpointing/test_nonpersistent.py
      - tests/unit_tests/dist_checkpointing/test_optimizer.py
      - tests/unit_tests/dist_checkpointing/test_safe_globals.py
      - tests/unit_tests/dist_checkpointing/models/test_moe_experts.py

      # distributed
      - tests/unit_tests/distributed/test_grad_sync_with_expert_parallel.py
      - tests/unit_tests/distributed/test_mcore_fully_sharded_data_parallel.py

      # export
      - tests/unit_tests/export/trtllm/test_distributed_fp8.py
      - tests/unit_tests/export/trtllm/test_single_device_fp8.py

      # === Need >2 GPU（model_size > 2） ===
      # core: tp=2,pp=4 or tp=world_size
      - tests/unit_tests/test_parallel_state.py
      - tests/unit_tests/test_tokenizer.py
      # models: tp≥4
      - tests/unit_tests/models/test_t5_model.py
      - tests/unit_tests/models/test_llava_model.py
      # transformer: tp*pp>2 or ep>2
      - tests/unit_tests/transformer/test_transformer_layer.py
      - tests/unit_tests/transformer/test_submodule_callables.py
      - tests/unit_tests/transformer/moe/test_sequential_mlp.py
      - tests/unit_tests/transformer/moe/test_token_dispatcher.py
      # tensor_parallel: tp≥4 or tp*pp=8
      - tests/unit_tests/tensor_parallel/test_cross_entropy.py
      - tests/unit_tests/tensor_parallel/test_mappings.py
      - tests/unit_tests/tensor_parallel/test_data.py
      - tests/unit_tests/tensor_parallel/test_random.py
      - tests/unit_tests/tensor_parallel/test_initialization.py
      - tests/unit_tests/tensor_parallel/test_tensor_parallel_utils.py
      - tests/unit_tests/tensor_parallel/test_layers.py
      # pipeline_parallel: pp≥4
      - tests/unit_tests/pipeline_parallel/test_schedules.py
      - tests/unit_tests/pipeline_parallel/test_pipeline_layout.py
      - tests/unit_tests/pipeline_parallel/test_bridge_communicator.py
      # distributed: pp=4
      - tests/unit_tests/distributed/test_grad_reduce_for_replicated_embedder.py
      - tests/unit_tests/distributed/fsdp/test_mfsdp_fully_shard.py
      # dist_checkpointing: tp*pp=8
      - tests/unit_tests/dist_checkpointing/test_serialization.py
      - tests/unit_tests/dist_checkpointing/test_strict.py
      - tests/unit_tests/dist_checkpointing/test_async_save.py
      - tests/unit_tests/dist_checkpointing/test_msc.py
      - tests/unit_tests/dist_checkpointing/test_torch_dist.py
      - tests/unit_tests/dist_checkpointing/test_replication.py
      - tests/unit_tests/dist_checkpointing/test_flattened_resharding.py
      # ssm: cp≥4 or tp=4
      - tests/unit_tests/ssm/test_mamba_mixer.py
      - tests/unit_tests/ssm/test_mamba_context_parallel.py

      # specific case that are unstable on Metax
      # core
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer ## RuntimeError: No CUDA GPUs are available
      - tests/unit_tests/test_local_multi_tensor_fns.py::test_local_multi_tensor_l2_norm_and_scale ## RuntimeError: No CUDA GPUs are available
      # models
      - tests/unit_tests/models/test_gpt_model.py::TestGPTModelWithCustomPG::test_gpt_model_with_custom_pg
      # post training
      - tests/unit_tests/post_training/test_modelopt_module_spec.py::TestModelOptMambaModel::test_inference

  functional:
    train:
      - model: gpt
        test_case: gpt3_mcore_te_tp1_pp1_resume_torch_dist_dist_optimizer
        training_script: pretrain_gpt.py
        n_repeat: 1
