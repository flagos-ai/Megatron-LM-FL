# Hardware Configuration Template for Megatron-LM-FL

hardware_name: my_hardware # Change this to your hardware name
display_name: 'My Hardware Tests' # Display name for GitHub Actions
setup_script: .github/scripts/set_env_my_hardware.sh
nproc_per_node: 8

# Docker image for this hardware (change image tag if needed)
ci_image: harbor.baai.ac.cn/flagscale/megatron-lm-fl:my-hardware-image

# Runner labels for this hardware
runner_labels:
  - self-hosted
  - Linux
  - X64
  - my-runner-label # Update: change to your runner's labels
  - gpu-8

# Container volumes (hardware-specific paths)
container_volumes:
  - /home/flagscale_cicd/flask/static:/workspace/report
  - /home/flagscale_cicd/flask/config:/workspace/config
  - /home/flagscale_cicd/docker/docker_build/docker_data:/home/gitlab-runner/data
  - /home/flagscale_cicd/docker/docker_build/docker_tokenizers:/home/gitlab-runner/tokenizers
  - /home/flagscale_cicd/docker/docker_build/docker_data/Megatron-LM/datasets:/opt/data/datasets
  - /home/flagscale_cicd/docker/docker_build/docker_tokenizers/Megatron-LM/tokenizers:/opt/data/tokenizers
# Add hardware-specific volumes here if needed (e.g., cache locations)

# Container options (hardware-specific settings)
container_options: '--privileged --gpus all --shm-size=500g --hostname megatron_cicd --user root --ulimit nofile=65535:65535'

# Device types to run tests on
device_types:
  - generic

# Adding a platform does not require changing the common workflows. Implement
# the top-level setup_script, then declare test groups and runner arguments here.
test_matrix:
  unit:
    devices:
      - generic
    pytest_extra_args: []
    groups:
      - name: models
        path: tests/unit_tests/models/
        description: Model tests
    ignored_tests: []

  functional:
    train: []
